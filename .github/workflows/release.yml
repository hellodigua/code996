name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整的 Git 历史，用于生成 commit log

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Clean build output
        run: rm -rf dist

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Get version from tag
        id: get_version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $VERSION does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Publish to npm
        run: npm publish --provenance

      - name: Create tarball
        id: tarball
        run: |
          # 把 GitHub Release 附件放到临时目录，避免 npm publish 时把 tgz 一起打进包。
          TARBALL=$(npm pack --pack-destination "$RUNNER_TEMP")
          echo "TARBALL=$RUNNER_TEMP/$TARBALL" >> $GITHUB_OUTPUT

      - name: Generate commit log
        id: commits
        run: |
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          echo "Current tag: $CURRENT_TAG"

          # 获取所有 tag 并按版本排序，找到上一个 tag
          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -A 1 "^${CURRENT_TAG}$" | tail -n 1)

          # 如果 PREV_TAG 等于 CURRENT_TAG，说明没有找到上一个 tag
          if [ "$PREV_TAG" = "$CURRENT_TAG" ] || [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, using recent commits"
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          else
            echo "Previous tag: $PREV_TAG"
            # 获取从上一个 tag 到当前 tag 的所有 commit（不包含上一个 tag 的 commit）
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges ${PREV_TAG}..${CURRENT_TAG})
          fi

          echo "Commits:"
          echo "$COMMITS"

          echo "COMMITS<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## 更新内容

            ${{ steps.commits.outputs.COMMITS }}
          files: |
            ${{ steps.tarball.outputs.TARBALL }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
